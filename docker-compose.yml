version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: kanban_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: kanban

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kanban_server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/kanban
      JWT_SECRET: change_me_in_production
      JWT_REFRESH_SECRET: change_me_refresh_in_production
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: kanban_client
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - server

volumes:
  mongo_data:
